name: CI/CD - Plesk Production

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plesk-production
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build production bundle
        run: yarn build

      - name: Upload build artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist/
          if-no-files-found: error
          retention-days: 3

  deploy:
    name: Deploy to Plesk
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://dspscare.com
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PLESK_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PLESK_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify deployment directory
        run: ssh -p 22 waiistudio@118.27.146.122 "test -d /var/www/vhosts/dspscare.com/httpdocs && test -w /var/www/vhosts/dspscare.com/httpdocs"

      - name: Deploy static files
        run: >-
          rsync -az --delete-after
          --exclude='.well-known/'
          --exclude='.plesk*'
          -e "ssh -p 22"
          dist/
          waiistudio@118.27.146.122:/var/www/vhosts/dspscare.com/httpdocs/
